openapi: 3.1.0
info:
  title: OpenMusicMetadata API
  description: A centralized metadata server for the OpenMusic ecosystem.
  version: 1.0.0
  license:
    name: AGPL-3.0
servers:
  - url: https://api.vleer.app/metadata/v1
    description: Production server
paths:
  /song/{id}:
    get:
      summary: Song
      description: Retrieve a single song by its OMID
      operationId: getSongById
      tags:
        - Song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-z]{16}$"
            description: 16-character OMID
          description: Song OMID
      responses:
        "200":
          description: Song found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "404":
          description: Song not found
  /artist/{id}:
    get:
      summary: Artist
      description: Retrieve a single artist by its OMID
      operationId: getArtistById
      tags:
        - Artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-z]{16}$"
            description: 16-character OMID
          description: Artist OMID
      responses:
        "200":
          description: Artist found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Artist not found
  /album/{id}:
    get:
      summary: Album
      description: Retrieve a single album by its OMID
      operationId: getAlbumById
      tags:
        - Album
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-z]{16}$"
            description: 16-character OMID
          description: Album OMID
      responses:
        "200":
          description: Album found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          description: Album not found
  /search:
    get:
      summary: Search
      description: Search across songs, artists, and albums. Optionally filter by item type.
      operationId: search
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [song, artist, album]
          description: Filter by item type (song, artist, or album). If omitted, searches all types.
        - name: artist
          in: query
          required: false
          schema:
            type: string
          description: Filter by artist name (applies to songs and albums)
        - name: album
          in: query
          required: false
          schema:
            type: string
          description: Filter by album name (applies to songs)
        - name: isrc
          in: query
          required: false
          schema:
            type: string
          description: Filter by ISRC code (applies to songs)
        - name: upc
          in: query
          required: false
          schema:
            type: string
          description: Filter by UPC code (applies to albums)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/SongSummary"
                        - $ref: "#/components/schemas/Artist"
                        - $ref: "#/components/schemas/Album"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
components:
  schemas:
    ArtistRef:
      type: object
      description: Minimal artist reference (id and name only)
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique artist OMID (16 chars)
        name:
          type: string
          description: Artist name
      required:
        - id
        - name
    AlbumRef:
      type: object
      description: Minimal album reference (id and name only)
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique album OMID (16 chars)
        name:
          type: string
          description: Album title
      required:
        - id
        - name
    SongSummary:
      type: object
      description: Lightweight song returned by the search endpoint
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique song OMID (16 chars)
        name:
          type: string
          description: Song title
        artist:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
          description: Artists (id and name only)
        album:
          type: array
          items:
            $ref: "#/components/schemas/AlbumRef"
          description: Albums (id and name only)
        genres:
          type: array
          items:
            type: string
          description: Genre names
        image:
          type: string
          format: uri
          description: Album artwork URL
        disc_number:
          type: integer
          description: Disc number in multi-disc releases
        track_number:
          type: integer
          description: Track number on album
        duration:
          type: integer
          description: Track duration in seconds
        isrc:
          type: string
          description: International Standard Recording Code
        date:
          type: string
          description: Release date
      required:
        - id
        - name
        - artist
        - album
        - genres
        - image
        - disc_number
        - track_number
        - duration
        - isrc
        - date
    Song:
      type: object
      description: Full song returned by /song/{id} with nested full objects
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique song OMID (16 chars)
        name:
          type: string
          description: Song title
        artist:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
          description: Full artist objects
        album:
          type: array
          items:
            $ref: "#/components/schemas/Album"
          description: Full album objects
        genres:
          type: array
          items:
            type: string
          description: Genre names
        image:
          type: string
          format: uri
          description: Album artwork URL
        disc_number:
          type: integer
          description: Disc number in multi-disc releases
        track_number:
          type: integer
          description: Track number on album
        duration:
          type: integer
          description: Track duration in seconds
        isrc:
          type: string
          description: International Standard Recording Code
        date:
          type: string
          description: Release date
      required:
        - id
        - name
        - artist
        - album
        - genres
        - image
        - disc_number
        - track_number
        - duration
        - isrc
        - date
    Artist:
      type: object
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique artist OMID (16 chars)
        name:
          type: string
          description: Artist name
        image:
          type: string
          format: uri
          description: Artist artwork URL
        genres:
          type: array
          items:
            type: string
          description: Genre names
      required:
        - id
        - name
        - image
        - genres
    Album:
      type: object
      properties:
        id:
          type: string
          pattern: "^[0-9a-z]{16}$"
          description: Unique album OMID (16 chars)
        name:
          type: string
          description: Album title
        artist:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
          description: Full artist objects
        genres:
          type: array
          items:
            type: string
          description: Genre names
        image:
          type: string
          format: uri
          description: Album artwork URL
        date:
          type: string
          description: Release date
        track_count:
          type: integer
          description: Number of tracks on album
        upc:
          type: string
          description: Universal Product Code
        label:
          type:
            - string
            - "null"
          description: Record label name
      required:
        - id
        - name
        - artist
        - genres
        - image
        - date
        - track_count
        - upc
