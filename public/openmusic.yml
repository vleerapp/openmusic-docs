openapi: 3.1.0
info:
  title: OpenMusic API
  version: 1.0.0
  description: Open standard for music service communication
  license:
    name: AGPL-3.0

servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: https://api.example.com/api
    description: Production server

tags:
  - name: Info
  - name: Songs
  - name: Albums
  - name: Artists
  - name: Playlists
  - name: Stations
  - name: List
  - name: Search

paths:
  /:
    get:
      tags: [Info]
      summary: Get API info
      operationId: getInfo
      parameters:
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: API info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        "500":
          $ref: "#/components/responses/Error"

  /songs:
    get:
      tags: [Songs]
      summary: Get songs by lookup
      operationId: getSongs
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Ids"
        - $ref: "#/components/parameters/OmmIds"
        - $ref: "#/components/parameters/Isrc"
        - $ref: "#/components/parameters/IncludeAll"
        - $ref: "#/components/parameters/View"
        - $ref: "#/components/parameters/ViewSongs"
        - $ref: "#/components/parameters/ViewAlbums"
        - $ref: "#/components/parameters/ViewArtists"
        - $ref: "#/components/parameters/LimitAlbums"
        - $ref: "#/components/parameters/LimitArtists"
      responses:
        "200":
          description: Matching songs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongListResponse"
        "400":
          $ref: "#/components/responses/Error"

  /songs/{id}:
    get:
      tags: [Songs]
      summary: Get song
      operationId: getSong
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/SongId"
        - $ref: "#/components/parameters/IncludeAll"
        - $ref: "#/components/parameters/View"
