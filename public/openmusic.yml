openapi: 3.1.0
info:
  title: OpenMusic API
  description: The Open standard for music service communication
  version: 1.0.0
  license:
    name: AGPL-3.0

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.example.com
    description: Production server

paths:
  /:
    get:
      summary: Info
      description: Returns information about the API including branding and capabilities
      operationId: getInfo
      tags:
        - Info
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                required:
                  - branding
                  - details
                properties:
                  branding:
                    type: object
                    properties:
                      name:
                        type: string
                      email:
                        type: string
                      short:
                        type: string
                      logo:
                        type: string
                        format: uri
                      theme:
                        type: string
                      links:
                        type: object
                        properties:
                          homepage:
                            type:
                              - string
                              - "null"
                            format: uri
                          privacyStatement:
                            type:
                              - string
                              - "null"
                            format: uri
                          donate:
                            type:
                              - string
                              - "null"
                            format: uri
                  details:
                    type: object
                    properties:
                      version:
                        type: string
                      capabilities:
                        type: object
                        properties:
                          search:
                            type: boolean
                          songs:
                            type: boolean
                          streaming:
                            type: boolean
                          filters:
                            type: boolean
                          artists:
                            type: boolean
                          albums:
                            type: boolean
                          playlists:
                            type: boolean
                          lyrics:
                            type: boolean
                          popular:
                            type: boolean
                          similar:
                            type: boolean
                          openMusicMetadata:
                            type: boolean
                          radio:
                            type: boolean
                          random:
                            type: boolean
                          list:
                            type: boolean
                          upload:
                            type: boolean
                          favorite:
                            type: boolean
                          rate:
                            type: boolean
                          edit:
                            type: boolean
              examples:
                success:
                  value:
                    branding:
                      name: "My Music Service"
                      email: "contact@example.com"
                      short: "MMS"
                      logo: "https://example.com/logo.png"
                      theme: "#0066cc"
                      links:
                        homepage: "https://example.com"
                        privacyStatement: "https://example.com/privacy"
                        donate: null
                    details:
                      version: "1.0.0"
                      capabilities:
                        search: true
                        songs: true
                        streaming: true
                        filters: false
                        artists: true
                        albums: true
                        playlists: false
                        lyrics: false
                        popular: false
                        similar: false
                        openMusicMetadata: true
                        radio: false
                        random: false
                        list: false
                        upload: false
                        favorite: false
                        rate: false
                        edit: false

  /song/{id}:
    get:
      summary: Song
      description: Retrieve detailed information about a song
      operationId: getSong
      tags:
        - Songs
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube video ID or watch URL
          schema:
            type: string
      responses:
        "200":
          description: Song found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
              examples:
                success:
                  value:
                    id: "dQw4w9WgXcQ"
                    name: "Never Gonna Give You Up"
                    omm_id: "abc1234567890def"
                    artist: "Rick Astley"
                    album: "Whenever You Need Somebody"
                    date: 1987
                    image: "/song/dQw4w9WgXcQ/art"
        "400":
          description: Invalid song ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Song not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /song/{id}/stream:
    get:
      summary: Stream
      description: Stream the audio of a song. Supports HTTP range requests.
      operationId: streamSong
      tags:
        - Songs
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube video ID or watch URL
          schema:
            type: string
        - name: Range
          in: header
          required: false
          description: Byte range for partial content (e.g. `bytes=0-1048575`)
          schema:
            type: string
      responses:
        "200":
          description: Full audio stream
          content:
            audio/mp4:
              schema:
                type: string
                format: binary
          headers:
            Accept-Ranges:
              schema:
                type: string
                example: "bytes"
            Content-Length:
              schema:
                type: integer
        "206":
          description: Partial audio content
          content:
            audio/mp4:
              schema:
                type: string
                format: binary
          headers:
            Content-Range:
              schema:
                type: string
                example: "bytes 0-1048575/6272474"
            Content-Length:
              schema:
                type: integer
        "400":
          description: Invalid song ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "416":
          description: Range not satisfiable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /song/{id}/image:
    get:
      summary: Cover Art
      description: Retrieve the cover art image for a song
      operationId: getSongImage
      tags:
        - Songs
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube video ID or watch URL
          schema:
            type: string
      responses:
        "200":
          description: Cover art image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          description: Cover art not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artist/{id}:
    get:
      summary: Artist
      description: Retrieve information about an artist by YouTube channel browse ID
      operationId: getArtist
      tags:
        - Artists
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube Music artist browse ID
          schema:
            type: string
      responses:
        "200":
          description: Artist found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
              examples:
                success:
                  value:
                    id: "UCuAXFkgsw1L7xaCfnd5JJOw"
                    name: "Rick Astley"
                    image: "/artist/UCuAXFkgsw1L7xaCfnd5JJOw/image"
        "404":
          description: Artist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /artist/{id}/image:
    get:
      summary: Artist Image
      description: Retrieve the image for an artist
      operationId: getArtistImage
      tags:
        - Artists
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube Music artist browse ID
          schema:
            type: string
      responses:
        "200":
          description: Artist image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /album/{id}:
    get:
      summary: Album
      description: Retrieve information about an album by YouTube Music playlist browse ID
      operationId: getAlbum
      tags:
        - Albums
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube Music album playlist ID
          schema:
            type: string
      responses:
        "200":
          description: Album found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
              examples:
                success:
                  value:
                    id: "MPREb_abc123"
                    name: "Whenever You Need Somebody"
                    artist: "Rick Astley"
                    date: 1987
                    trackCount: 10
                    image: "/album/MPREb_abc123/art"
        "404":
          description: Album not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /album/{id}/art:
    get:
      summary: Album Art
      description: Retrieve the cover art for an album
      operationId: getAlbumArt
      tags:
        - Albums
      parameters:
        - name: id
          in: path
          required: true
          description: YouTube Music album playlist ID
          schema:
            type: string
      responses:
        "200":
          description: Album art image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          description: Art not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /search:
    get:
      summary: Search
      description: Search for songs, artists, or albums. Defaults to songs if no type is specified.
      operationId: search
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Filter results by item type. Defaults to song.
          schema:
            type: string
            enum: [song, artist, album]
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - type
                  - data
                  - total
                  - limit
                  - offset
                properties:
                  type:
                    type: string
                    enum: [song, artist, album]
                    description: The item type of all results in data
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/Song"
                        - $ref: "#/components/schemas/Artist"
                        - $ref: "#/components/schemas/Album"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
              examples:
                songs:
                  value:
                    type: "song"
                    data:
                      - id: "dQw4w9WgXcQ"
                        name: "Never Gonna Give You Up"
                        artist: "Rick Astley"
                    image: "/song/dQw4w9WgXcQ/image"
                    total: 1
                    limit: 20
                    offset: 0
                artists:
                  value:
                    type: "artist"
                    data:
                      - id: "UCuAXFkgsw1L7xaCfnd5JJOw"
                        name: "Rick Astley"
                        image: "/artist/UCuAXFkgsw1L7xaCfnd5JJOw/image"
                    total: 1
                    limit: 20
                    offset: 0
                empty:
                  value:
                    type: "song"
                    data: []
                    total: 0
                    limit: 20
                    offset: 0
        "400":
          description: Missing or invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Song:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: YouTube video ID
        name:
          type: string
          description: Title of the song
        omm_id:
          type:
            - string
            - "null"
          description: OpenMusicMetadata ID (OMID) if matched
        artist:
          type:
            - string
            - "null"
          description: Name of the artist
        album:
          type:
            - string
            - "null"
          description: Name of the album
        genre:
          type:
            - string
            - "null"
          description: Genre of the song
        date:
          type:
            - integer
            - "null"
          description: Release year
        track_number:
          type:
            - integer
            - "null"
          description: Track number within the album
        disc_number:
          type:
            - integer
            - "null"
          description: Disc number for multi-disc releases
        image:
          type:
            - string
            - "null"
          format: uri
          description: URL to the cover art image
        lyrics:
          type:
            - string
            - "null"
          description: Song lyrics

    Artist:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: YouTube Music artist browse ID
        name:
          type: string
          description: Name of the artist
        image:
          type:
            - string
            - "null"
          format: uri
          description: URL to the artist image

    Album:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          description: YouTube Music album playlist ID
        name:
          type: string
          description: Title of the album
        artist:
          type:
            - string
            - "null"
          description: Name of the artist
        date:
          type:
            - integer
            - "null"
          description: Release year
        track_count:
          type:
            - integer
            - "null"
          description: Number of tracks on the album
        image:
          type:
            - string
            - "null"
          format: uri
          description: URL to the cover art image

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
        code:
          type:
            - string
            - "null"
          description: Error code
